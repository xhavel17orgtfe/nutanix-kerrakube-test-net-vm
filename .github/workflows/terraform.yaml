name: "Terrakube Remote Run"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: "terraform-remote-run"
  cancel-in-progress: false

jobs:
  terraform:
    name: "Terraform Action"
    runs-on: 
      group: default
    
    env:
      TF_IN_AUTOMATION: "true"

    steps:
      # 1. Manually install Node.js so the Terraform wrapper can execute
      - name: Prepare Node.js Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_hostname: 'terrakube-api.rak.farnostrakvice.cz'
          cli_config_credentials_token: ${{ secrets.TERRAKUBE_TOKEN }}
          # Turning the wrapper off is the safest way to avoid 'node' errors
          terraform_wrapper: false 

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -no-color -input=false