name: "Terrakube Remote Run"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Ensures only one Terraform run happens at a time to prevent state locking
concurrency:
  group: "terraform-remote-run"
  cancel-in-progress: false

jobs:
  terraform:
    name: "Terraform Action"
    # Using your self-hosted runner group (ARC or binary runner)
    runs-on: 
      group: default
    
    # Using your custom image with Node.js 20, Terraform, and GCloud installed
    container: 
      image: cr.rak.farnostrakvice.cz:50443/my/my-gcp-terraform-ubuntu:latest

    env:
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          # Points to your internal Terrakube API
          cli_config_credentials_hostname: 'terrakube-api.rak.farnostrakvice.cz'
          # Uses the secret verified in your GitHub UI screenshot
          cli_config_credentials_token: ${{ secrets.TERRAKUBE_TOKEN }}

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Plan
        id: plan
        # -no-color keeps the logs clean and readable in the GH UI
        run: terraform plan -no-color -input=false

      # Only executes 'apply' on pushes to the main branch (not on PRs)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -no-color -input=false