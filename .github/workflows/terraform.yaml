name: Terraform

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: terraform-main
  cancel-in-progress: false

jobs:
  plan:
    name: Terraform Plan
    runs-on: 
      group: default
    container:
      image: cr.rak.farnostrakvice.cz:50443/my/my-gcp-terraform:latest
      
    permissions:
      contents: read
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TF_TOKEN_terrakube_api_rak_farnostrakvice_cz: ${{ secrets.TERRAKUBE_TOKEN }}
    steps:
      - name: Checkout Repository
        run: |
          set -euo pipefail
          git init .
          git remote remove origin || true
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${GITHUB_SHA}"
          git checkout --force --detach FETCH_HEAD
          git clean -ffdqx

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -input=false

  apply:
    name: Terraform Apply
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: 
      group: default
    container:
      image: cr.rak.farnostrakvice.cz:50443/my/my-gcp-terraform:latest
    permissions:
      contents: read
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TF_TOKEN_terrakube_api_rak_farnostrakvice_cz: ${{ secrets.TERRAKUBE_TOKEN }}
    steps:
      - name: Checkout Repository
        run: |
          set -euo pipefail
          git init .
          git remote remove origin || true
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${GITHUB_SHA}"
          git checkout --force --detach FETCH_HEAD
          git clean -ffdqx

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve
