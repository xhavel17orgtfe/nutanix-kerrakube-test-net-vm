name: Terraform

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: terraform-main
  cancel-in-progress: false

env:
  TERRAFORM_IMAGE: cr.rak.farnostrakvice.cz:50443/my/my-gcp-terraform:latest

jobs:
  plan:
    name: Terraform Plan
    runs-on: 
      group: default
    permissions:
      contents: read
    env:
      TF_TOKEN_terrakube_api_rak_farnostrakvice_cz: ${{ secrets.TERRAKUBE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Terraform Plan
        run: |
          set -euo pipefail
          cid=$(docker create \
            -e TF_TOKEN_terrakube_api_rak_farnostrakvice_cz \
            "$TERRAFORM_IMAGE" \
            sh -lc 'cd /workspace && terraform init -input=false && terraform plan -input=false -out=tfplan')
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          docker cp "$GITHUB_WORKSPACE/." "$cid:/workspace"
          docker start -a "$cid"
          docker cp "$cid:/workspace/tfplan" "$GITHUB_WORKSPACE/tfplan"
          docker rm -f "$cid" >/dev/null 2>&1 || true
          trap - EXIT

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  apply:
    name: Terraform Apply
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: 
      group: default
    permissions:
      contents: read
    env:
      TF_TOKEN_terrakube_api_rak_farnostrakvice_cz: ${{ secrets.TERRAKUBE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: .

      - name: Terraform Apply
        run: |
          set -euo pipefail
          cid=$(docker create \
            -e TF_TOKEN_terrakube_api_rak_farnostrakvice_cz \
            "$TERRAFORM_IMAGE" \
            sh -lc 'cd /workspace && terraform init -input=false && terraform apply -input=false -auto-approve tfplan')
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          docker cp "$GITHUB_WORKSPACE/." "$cid:/workspace"
          docker start -a "$cid"
          docker rm -f "$cid" >/dev/null 2>&1 || true
          trap - EXIT
