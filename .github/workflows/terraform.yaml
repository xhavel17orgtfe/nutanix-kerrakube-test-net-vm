name: "Terrakube Remote Run"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform:
    name: "Terraform Action"
    # Using your self-hosted runner group
    runs-on: 
      group: default
    container: 
      image: cr.rak.farnostrakvice.cz:50443/my/my-gcp-terraform-ubuntu:latest
    
    env:
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          # hostname MUST match your Terrakube API exactly
          cli_config_credentials_hostname: 'terrakube-api.rak.farnostrakvice.cz'
          # Using the secret name shown in your screenshot
          cli_config_credentials_token: ${{ secrets.TERRAKUBE_TOKEN }}

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Plan
        id: plan
        # -no-color ensures GitHub logs stay clean
        run: terraform plan -no-color -input=false

      # Only run Apply on a push to the main branch
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -no-color -input=false