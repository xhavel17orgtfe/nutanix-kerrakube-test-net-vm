name: Terraform

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: terraform-main
  cancel-in-progress: false

env:
  TERRAFORM_IMAGE: cr.rak.farnostrakvice.cz:50443/my/my-gcp-terraform:latest

jobs:
  plan:
    name: Terraform Plan
    runs-on: 
      group: default
    permissions:
      contents: read
    env:
      TF_TOKEN_terrakube_api_rak_farnostrakvice_cz: ${{ secrets.TERRAKUBE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform Plan
        run: >-
          docker run --rm
          -e TF_TOKEN_terrakube_api_rak_farnostrakvice_cz
          -v "$GITHUB_WORKSPACE:/workspace"
          -w /workspace
          "$TERRAFORM_IMAGE"
          sh -lc 'terraform init -input=false && terraform plan -input=false -out=tfplan'

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  apply:
    name: Terraform Apply
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: 
      group: default
    permissions:
      contents: read
    env:
      TF_TOKEN_terrakube_api_rak_farnostrakvice_cz: ${{ secrets.TERRAKUBE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: .

      - name: Terraform Apply
        run: >-
          docker run --rm
          -e TF_TOKEN_terrakube_api_rak_farnostrakvice_cz
          -v "$GITHUB_WORKSPACE:/workspace"
          -w /workspace
          "$TERRAFORM_IMAGE"
          sh -lc 'terraform init -input=false && terraform apply -input=false -auto-approve tfplan'
