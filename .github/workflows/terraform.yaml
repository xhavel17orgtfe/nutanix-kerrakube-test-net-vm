name: Terraform

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: terraform-main
  cancel-in-progress: false

jobs:
  plan:
    name: Terraform Plan
    runs-on: 
      group: default
    container:
      image: cr.rak.farnostrakvice.cz:50443/my/my-gcp-terraform:latest
      
    permissions:
      contents: read
    env:
      TF_TOKEN_terrakube_api_rak_farnostrakvice_cz: ${{ secrets.TERRAKUBE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -input=false

  apply:
    name: Terraform Apply
    needs: plan
    runs-on: 
      group: default
    container:
      image: cr.rak.farnostrakvice.cz:50443/my/my-gcp-terraform:latest
    permissions:
      contents: read
    env:
      TF_TOKEN_terrakube_api_rak_farnostrakvice_cz: ${{ secrets.TERRAKUBE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan
